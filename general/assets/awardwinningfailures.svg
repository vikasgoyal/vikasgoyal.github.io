<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Award-winning failures illustration</title>
  <desc id="desc">A trophy stands above unstable project pillars while adoption, value, and fit indicators decline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe4"/>
      <stop offset="100%" stop-color="#dbe8e6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd97a"/>
      <stop offset="100%" stop-color="#d39b1f"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e6a73"/>
      <stop offset="100%" stop-color="#27434c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1e2b30" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.24">
    <circle cx="160" cy="120" r="90" fill="#ffffff"/>
    <circle cx="1080" cy="120" r="120" fill="#fff7d8"/>
    <circle cx="1040" cy="540" r="150" fill="#ffffff"/>
  </g>

  <g transform="translate(110 70)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="40" fill="#18343c">Award-Winning Failures</text>
    <text x="0" y="40" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#46616a">Projects that win attention before they prove value</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M170 425 C320 440, 470 455, 610 462 C760 470, 900 478, 1040 490 L1040 525 L170 525 Z" fill="#e85d4a" opacity="0.12"/>
    <path d="M170 425 C320 440, 470 455, 610 462 C760 470, 900 478, 1040 490" fill="none" stroke="#d84f3f" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(260 210)" filter="url(#shadow)">
    <rect x="0" y="120" width="170" height="210" rx="14" fill="#f4fbfb" stroke="#2a4a53" stroke-width="4"/>
    <rect x="205" y="80" width="170" height="250" rx="14" fill="#f4fbfb" stroke="#2a4a53" stroke-width="4"/>
    <rect x="410" y="155" width="170" height="175" rx="14" fill="#f4fbfb" stroke="#2a4a53" stroke-width="4"/>

    <rect x="4" y="290" width="162" height="36" fill="#d8e7e5"/>
    <rect x="209" y="290" width="162" height="36" fill="#d8e7e5"/>
    <rect x="414" y="290" width="162" height="36" fill="#d8e7e5"/>

    <text x="85" y="315" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#27434c">Problem Fit</text>
    <text x="290" y="315" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#27434c">Executive Buzz</text>
    <text x="495" y="315" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#27434c">Adoption</text>

    <text x="85" y="175" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#d84f3f">32%</text>
    <text x="290" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700" fill="#1e7a63">96%</text>
    <text x="495" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#d84f3f">21%</text>

    <path d="M60 218 L110 235 L140 252" fill="none" stroke="#d84f3f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M265 220 L300 180 L330 195" fill="none" stroke="#1e7a63" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M455 222 L500 240 L535 258" fill="none" stroke="#d84f3f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(520 108) scale(0.82)" filter="url(#shadow)">
    <rect x="25" y="188" width="140" height="26" rx="8" fill="#6f4d2e"/>
    <rect x="42" y="168" width="106" height="30" rx="6" fill="#8a6240"/>
    <path d="M65 42 H125 C125 76 141 104 167 118 V148 C145 163 126 180 112 205 H78 C64 180 45 163 23 148 V118 C49 104 65 76 65 42 Z" fill="url(#gold)" stroke="#a87312" stroke-width="5"/>
    <path d="M60 54 H28 C28 90 44 113 77 113" fill="none" stroke="#a87312" stroke-width="10" stroke-linecap="round"/>
    <path d="M130 54 H162 C162 90 146 113 113 113" fill="none" stroke="#a87312" stroke-width="10" stroke-linecap="round"/>
    <circle cx="95" cy="92" r="34" fill="#fff4c6" opacity="0.75"/>
    <path d="M95 68 L103 86 L123 88 L108 101 L112 121 L95 110 L78 121 L82 101 L67 88 L87 86 Z" fill="#c27d14"/>
  </g>

  <g transform="translate(842 160)">
    <rect x="0" y="0" width="282" height="184" rx="20" fill="#18343c" opacity="0.94"/>
    <text x="24" y="38" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#f5f1e8">Typical signals rewarded</text>
    <circle cx="28" cy="78" r="4" fill="#d6e4e1"/>
    <text x="42" y="84" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#d6e4e1">polished demos</text>
    <circle cx="28" cy="110" r="4" fill="#d6e4e1"/>
    <text x="42" y="116" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#d6e4e1">sponsor visibility</text>
    <circle cx="28" cy="142" r="4" fill="#d6e4e1"/>
    <text x="42" y="148" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#d6e4e1">innovation theater</text>
    <path d="M24 164 H258" stroke="#6c8b92" stroke-width="1" opacity="0.45"/>
    <text x="24" y="178" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b9ccca">Easy to praise. Hard to sustain.</text>
  </g>

  <g transform="translate(126 548)">
    <rect x="0" y="0" width="948" height="24" rx="12" fill="url(#steel)" opacity="0.92"/>
  </g>
</svg>